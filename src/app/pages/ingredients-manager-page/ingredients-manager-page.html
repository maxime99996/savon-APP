<div class="container">
<div class="card border-success-subtle shadow">
<div class="card-header bg-success text-light fw-bold h5 ">
<i class="bi bi-flask-fill"></i> Gestion des Ingrédients
</div>
<div class="card-body p-0">
<table class="table table-striped table-hover">
<thead class="table-success">
<tr>
<th>ID</th>
<th>Nom</th>
<th>SAP (NaOH)</th>
<th>INS</th>
<th>Iode</th>
<!-- TODO 1 : Ajouter les caractérisitiques manquantes -->
<th class="text-center">Actions</th>
</tr>
</thead>
<tbody>
@for (item of ingredients; track item.id) {
<tr>
<td>{{ item.id }}</td>
<td><strong>{{ item.nom }}</strong></td>
<td>{{ item.sapo }}</td>
<td>{{ item.ins }}</td>
<td>{{ item.iode }}</td>
<td class="text-center">
<button class="btn btn-sm btn-warning me-2">
<i class="bi bi-pencil-fill"></i>
<!-- TODO 3 : Ouvrir le modal ou insérer un
formulaire dans ligne pour permettre la saisi -->
</button>
<button class="btn btn-sm btn-danger">
<i class="bi bi-trash-fill"></i>
<!-- TODO 2 : Récupérer et appeler la méthode de
suppression de la logique -->
</button>
</td>
</tr>
}
<!-- Message affiché si problème accès API -->
@empty {
<tr>
<td colspan="6" class="text-center text-muted py-4">
<i class="bi bi-exclamation-triangle"></i>
Aucun ingrédient trouvé.
Vérifiez que votre API Backend est bien lancée sur le
port 8080.
</td>
</tr>
}
</tbody>
</table>
</div>
<div class="card-footer bg-success ">
<button class="btn btn-sm btn-light fw-bold">
<i class="bi bi-plus-circle"></i> Ingrédient
<!-- TODO 4: Ajouter un modale pour l'ajout d'un nouvel ingrédient
OU insérer une ligne formulaire -->
</button>
</div>
</div>
</div>
